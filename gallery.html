  <style>
    .gallery-day-card {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      transition: transform .25s, box-shadow .25s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .gallery-day-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0,0,0,.18);
    }
    .gallery-day-card .thumb {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, var(--primary), #2980b9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: rgba(255,255,255,.4);
      position: relative;
    }
    .gallery-day-card .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-day-card .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 60%);
    }
    .gallery-day-card .card-footer-custom {
      background: #fff;
      padding: 20px 24px;
      border-top: 3px solid var(--primary);
    }
    /* Lightbox-style grid for individual photos */
    .photo-grid img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      cursor: zoom-in;
      transition: transform .2s, box-shadow .2s;
    }
    .photo-grid img:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 20px rgba(0,0,0,.18);
    }
  </style>
</head>
